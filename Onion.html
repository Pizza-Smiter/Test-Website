<body>

    <img src="Onion.png" alt="RipOnion" width="500" height="500">
    <h1>R.I.P. ONION</h1>
    <p>Gaster & Gang slimed my boy Onion ):</p>

    <audio id="bgMusic" loop>
        <source src="PirateDojo.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.querySelector('audio');
        if(!audio)
        {
            console.error("Could not find audio")
        }
        function startAudioOnInteraction()
        {
            audio.play().then(() =>
            {
                console.log("Audio started and looping");

                document.removeEventListener('click', startAudioOnInteraction);
            })
                .catch(error =>
                {
                    console.log("Waiting for interaction");
                });
        }

        document.addEventListener('click', startAudioOnInteraction);
    </script>
